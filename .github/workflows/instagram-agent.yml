name: Instagram Autopilot Agent

on:
  schedule:
    # 09:00 IST  = 03:30 UTC
    - cron: "30 3 * * *"
    # 13:00 IST  = 07:30 UTC
    - cron: "30 7 * * *"
    # 19:00 IST  = 13:30 UTC
    - cron: "30 13 * * *"
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install agent dependencies
        working-directory: ./agent
        run: npm install

      - name: Install fonts (Satori)
        working-directory: ./agent
        run: |
          mkdir -p fonts
          wget -q -O fonts/Inter-Regular.ttf "https://github.com/rsms/inter/raw/master/docs/font-files/Inter-Regular.ttf"
          wget -q -O fonts/Inter-Bold.ttf "https://github.com/rsms/inter/raw/master/docs/font-files/Inter-Bold.ttf"
          wget -q -O fonts/JetBrainsMono-Regular.ttf "https://github.com/JetBrains/JetBrainsMono/raw/master/fonts/ttf/JetBrainsMono-Regular.ttf"

      - name: Run agent pipeline (slot auto-detected)
        working-directory: ./agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTING_TIMEZONE: Asia/Kolkata
        run: npx tsx src/index.ts

